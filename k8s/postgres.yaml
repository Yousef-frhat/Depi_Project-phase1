apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: chargehub
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: chargehub
type: Opaque
data:
  POSTGRES_USER: Y2hhcmdlaHVi          # chargehub
  POSTGRES_PASSWORD: Y2hhcmdlaHVi      # chargehub
  POSTGRES_DB: Y2hhcmdlaHVi            # chargehub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: chargehub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "chargehub"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: chargehub
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
