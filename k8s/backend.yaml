apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: chargehub
data:
  DATABASE_URL: "postgresql://chargehub:chargehub@postgres-service:5432/chargehub"
  FLASK_DEBUG: "false"
  CORS_ORIGINS: "*"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: chargehub
type: Opaque
data:
  JWT_SECRET_KEY: Y2hhcmdlaHViLXByb2R1Y3Rpb24tc2VjcmV0LWtleS0yMDI0  # chargehub-production-secret-key-2024
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: chargehub
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: chargehub-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: chargehub
spec:
  selector:
    app: backend
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: chargehub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
