name: ChargeHub CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: chargehub-backend
  FRONTEND_IMAGE: chargehub-frontend

permissions:
  contents: read
  packages: write
jobs:
  # ============================================================
  # LINT & TEST
  # ============================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chargehub
          POSTGRES_PASSWORD: chargehub
          POSTGRES_DB: chargehub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          cd backend
          flake8 --max-line-length=120 --ignore=E501,W503 .

      - name: Initialize test database
        env:
          DATABASE_URL: postgresql://chargehub:chargehub@localhost:5432/chargehub_test
        run: |
          cd backend
          python init_db.py

      - name: Run health check test
        env:
          DATABASE_URL: postgresql://chargehub:chargehub@localhost:5432/chargehub_test
        run: |
          cd backend
          python -c "
          from app import app
          client = app.test_client()
          resp = client.get('/api/health')
          assert resp.status_code == 200
          print('Health check passed!')
          "

  # ============================================================
  # BUILD & PUSH DOCKER IMAGES
  # ============================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase repository owner
        id: repo_owner
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # DEPLOY TO PRODUCTION
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------------------------------------
      # REQUIRED GITHUB SECRETS (configure in repo Settings → Secrets):
      #   DEPLOY_HOST     - Production server IP/hostname
      #   DEPLOY_USER     - SSH username (e.g. ubuntu)
      #   DEPLOY_SSH_KEY  - Private SSH key for the deploy user
      # ---------------------------------------------------------
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
          set -e
          cd /opt/chargehub

          # Pull latest images from GHCR
          echo "🔄 Pulling latest images..."
          docker compose pull

          # Restart services with new images
          echo "🚀 Starting updated services..."
          docker compose up -d --remove-orphans

          # Wait for backend health
          echo "⏳ Waiting for backend to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "✅ Backend is healthy!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Backend health check failed after 30 attempts"
              exit 1
            fi
            sleep 5
          done

          echo "✅ Deployment complete!"
          EOF

      - name: Deployment summary
        run: |
          echo "🚀 Deployed ChargeHub to production"
          echo "Backend image: ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo "Frontend image: ${{ env.REGISTRY }}/${{ steps.repo_owner.outputs.owner }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
